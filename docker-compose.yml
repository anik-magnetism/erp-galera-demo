version: "3.9"

services:
  # ----------------------------
  # Laravel App
  # ----------------------------
  laravel_app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gelera_laravel_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - galera1
      - redis
    ports:
      - "8000:8000"
    networks:
      - erp_net

  # ----------------------------
  # Redis
  # ----------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - erp_net

  # ----------------------------
  # Galera Node 1 (Bootstrap)
  # ----------------------------
  galera1:
    image: nullata/mariadb-galera:latest
    container_name: galera1
    ports:
      - "3307:3306"
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: erp_demo
      MARIADB_USER: erp_user
      MARIADB_PASSWORD: erp_password

      MARIADB_GALERA_CLUSTER_NAME: erp_cluster
      MARIADB_GALERA_CLUSTER_ADDRESS: gcomm://

      MARIADB_GALERA_NODE_NAME: galera1
      MARIADB_GALERA_NODE_ADDRESS: galera1

      MARIADB_GALERA_MARIABACKUP_PASSWORD: backuppassword
      MARIADB_GALERA_CLUSTER_BOOTSTRAP: "yes"
    volumes:
      - galera1_data:/var/lib/mysql
    networks:
      - erp_net
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-prootpassword"]
      interval: 5s
      retries: 20
      start_period: 10s

  # ----------------------------
  # Galera Node 2
  # ----------------------------
  galera2:
    image: nullata/mariadb-galera:latest
    container_name: galera2
    depends_on: 
      - galera1
    ports:
      - "3308:3306"
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: erp_demo
      MARIADB_USER: erp_user
      MARIADB_PASSWORD: erp_password

      MARIADB_GALERA_CLUSTER_NAME: erp_cluster
      MARIADB_GALERA_CLUSTER_ADDRESS: gcomm://galera1

      MARIADB_GALERA_NODE_NAME: galera2
      MARIADB_GALERA_NODE_ADDRESS: galera2

      MARIADB_GALERA_MARIABACKUP_PASSWORD: backuppassword
      MARIADB_GALERA_CLUSTER_BOOTSTRAP: "no"
    volumes:
      - galera2_data:/var/lib/mysql
    networks:
      - erp_net
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-prootpassword"]
      interval: 5s
      retries: 20
      start_period: 10s

  # ----------------------------
  # Galera Node 3
  # ----------------------------
  galera3:
    image: nullata/mariadb-galera:latest
    container_name: galera3
    depends_on:
      - galera1
    ports:
      - "3309:3306"
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: erp_demo
      MARIADB_USER: erp_user
      MARIADB_PASSWORD: erp_password

      MARIADB_GALERA_CLUSTER_NAME: erp_cluster
      MARIADB_GALERA_CLUSTER_ADDRESS: gcomm://galera1

      MARIADB_GALERA_NODE_NAME: galera3
      MARIADB_GALERA_NODE_ADDRESS: galera3

      MARIADB_GALERA_MARIABACKUP_PASSWORD: backuppassword
      MARIADB_GALERA_CLUSTER_BOOTSTRAP: "no"
    volumes:
      - galera3_data:/var/lib/mysql
    networks:
      - erp_net
    restart: always

  # ----------------------------
  # phpMyAdmin
  # ----------------------------
  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: phpmyadmin
    depends_on:
      - galera1
    environment:
      PMA_HOST: galera1
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - "8080:80"
    networks:
      - erp_net

# ----------------------------
# Networks
# ----------------------------
networks:
  erp_net:
    driver: bridge

# ----------------------------
# Volumes
# ----------------------------
volumes:
  galera1_data:
  galera2_data:
  galera3_data: